<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Diamond shapes -->
  <g transform="translate(100, 70)">
    <!-- Left diamond -->
    <path d="M-10,0 L-40,-30 L-10,-60 L20,-30 Z" fill="#1a5276" stroke="none"/>
    <!-- Right diamond -->
    <path d="M10,0 L40,-30 L10,-60 L-20,-30 Z" fill="#2e86c1" stroke="none"/>
    <!-- Bottom overlap -->
    <path d="M0,10 L-30,-20 L0,-50 L30,-20 Z" fill="url(#grad1)" stroke="none" opacity="0.7"/>
  </g>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e86c1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Text -->
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1a5276">PROESA</text>
  <text x="100" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2e86c1" letter-spacing="3">SOLUCIONES EN SALUD</text>
</svg>
