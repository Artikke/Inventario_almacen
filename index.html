<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROESA - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- ═══ LOGIN ═══ -->
    <div id="loginView" class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>PROESA</h1>
                    <p>SOLUCIONES EN SALUD</p>
                </div>
                <h5 class="text-center mb-4" style="color:#1a5276;font-weight:600">Sistema de Inventario</h5>
                <div id="loginAlert" class="alert alert-danger d-none py-2"></div>
                <div id="loginFormDiv">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="loginUser" class="form-control" placeholder="Tu usuario" autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="loginPass" class="form-control" placeholder="Tu contrasena"
                                   onkeydown="if(event.key==='Enter')login()">
                        </div>
                    </div>
                    <button onclick="login()" class="btn btn-proesa w-100" id="loginBtn">Iniciar Sesion</button>
                </div>
                <hr>
                <div id="setupToggle" class="text-center">
                    <a href="#" onclick="toggleSetup(true);return false" class="small text-muted">
                        Primera vez? Configura el sistema
                    </a>
                </div>
                <div id="setupFormDiv" class="d-none">
                    <h6 class="text-proesa mb-3">Configuracion Inicial</h6>
                    <div class="mb-2">
                        <input type="text" id="setupNombre" class="form-control" placeholder="Tu nombre completo">
                    </div>
                    <div class="mb-2">
                        <input type="text" id="setupUser" class="form-control" placeholder="Usuario (ej: admin)">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="setupPass" class="form-control" placeholder="Contrasena (min 6 caracteres)">
                    </div>
                    <button onclick="setupAdmin()" class="btn btn-success w-100">Crear Admin y Cargar Datos</button>
                    <button onclick="toggleSetup(false)" class="btn btn-link w-100 mt-1 small">Cancelar</button>
                </div>
            </div>
            <p class="login-footer">PROESA Soluciones en Salud</p>
        </div>
    </div>

    <!-- ═══ APP ═══ -->
    <div id="appView" style="display:none">
        <nav id="mainNav" class="navbar navbar-expand-lg navbar-proesa"></nav>
        <div id="alertContainer" class="container-fluid mt-2"></div>
        <main id="mainContent" class="container-fluid py-3"></main>
        <footer class="footer-proesa">
            <div class="container-fluid text-center">PROESA Soluciones en Salud &mdash; Sistema de Inventario</div>
        </footer>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <!-- ExcelJS for styled Excel export -->
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <!-- FileSaver for download -->
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App -->
    <script src="js/app.js"></script>
</body>
</html>
